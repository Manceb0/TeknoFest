services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - path: backend/.env
        required: false
    volumes:
      - quismotion-data:/app/data
    environment:
      DATABASE_PATH: /app/data/quismotion.db

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  quismotion-data:
